<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4cc9f0"/>
      <stop offset="100%" stop-color="#4361ee"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <!-- SC text -->
  <text x="256" y="290" text-anchor="middle" font-family="'Segoe UI', 'Arial Black', sans-serif" font-weight="900" font-size="220" fill="url(#accent)" letter-spacing="-8">SC</text>
  <!-- Small patch indicator bar -->
  <rect x="136" y="340" width="240" height="6" rx="3" fill="url(#accent)" opacity="0.5"/>
  <!-- Dots suggesting code/language -->
  <circle cx="176" cy="370" r="5" fill="#4cc9f0" opacity="0.4"/>
  <circle cx="256" cy="370" r="5" fill="#4cc9f0" opacity="0.4"/>
  <circle cx="336" cy="370" r="5" fill="#4cc9f0" opacity="0.4"/>
</svg>
