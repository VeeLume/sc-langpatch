name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout sc-langpatch
        uses: actions/checkout@v4
        with:
          path: sc-langpatch

      - name: Checkout svarog
        uses: actions/checkout@v4
        with:
          repository: VeeLume/svarog
          path: svarog

      - name: Extract changelog
        id: changelog
        shell: bash
        working-directory: sc-langpatch
        run: |
          # Extract version from tag (v0.1.0 -> 0.1.0)
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the section for this version from CHANGELOG.md
          # Grabs everything between ## [x.y.z] and the next ## [
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi

          # Write to output using heredoc delimiter
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sc-langpatch/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: sc-langpatch
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: sc-langpatch
          tagName: ${{ github.ref_name }}
          releaseName: "SC LangPatch ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
